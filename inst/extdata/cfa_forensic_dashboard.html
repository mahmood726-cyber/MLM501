<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CFA | Forensic Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; margin: 0; padding: 25px; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 25px; max-width: 1800px; margin: auto; }
        .card { background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .span-8 { grid-column: span 8; } .span-4 { grid-column: span 4; } .span-12 { grid-column: span 12; }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(90deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        tbody tr { cursor: pointer; transition: background-color 0.2s; }
        tbody tr:hover { background-color: rgba(255,255,255,0.05); }
        #detailPane { background: rgba(0,0,0,0.3); padding: 25px; border-radius: 15px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
<div class="grid">
    <div class="card span-12" style="text-align:center;"><h1>Cochrane Fragility Atlas: Forensic Edition</h1></div>

    <div class="card span-8">
        <h2>Evidence Frontier <span style="font-size:0.8rem; color:#64748b;">(Click a row for forensic details)</span></h2>
        <div style="overflow-x:auto;">
            <table id="targetTable">
                <thead><tr><th>Analysis ID</th><th>MAFI</th><th>ROE Index</th><th>Bayesian MAFI (95% CI)</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        <div id="detailPane">
            <h3>Forensic Details: <span id="detail-id"></span></h3>
            <p><strong>Economic Impact (Cost of Fragility):</strong> <span id="detail-econ"></span></p>
            <canvas id="detail-chart" height="100"></canvas>
        </div>
    </div>

    <div class="card span-4">
        <h2>Specialty Vulnerability</h2>
        <canvas id="specialtyChart" height="250"></canvas>
    </div>
</div>

<script>
    const data = [
        {id:"CD015140_G1", specialty:"Resp", mafi:0.97, roe:0.98, studies:[0.1,0.2,1.5], bayes_ci:[0.90, 0.99], cost_fragility:"£1.2M"},
        {id:"CD000028_G1", specialty:"Cardio", mafi:0.16, roe:0.85, studies:[0.8,0.9,0.85], bayes_ci:[0.12, 0.20], cost_fragility:"£150K"},
        {id:"CD010861_G6", specialty:"Neuro", mafi:0.64, roe:0.92, studies:[0.5,0.6,1.1], bayes_ci:[0.55, 0.73], cost_fragility:"£850K"}
    ];
    
    const tbody = document.getElementById('tbody');
    const detailPane = document.getElementById('detailPane');
    const detailId = document.getElementById('detail-id');
    const detailEcon = document.getElementById('detail-econ');
    const detailChartCtx = document.getElementById('detail-chart').getContext('2d');
    let detailChart;

    data.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.id}</td><td>${r.mafi}</td><td>${r.roe}</td><td>${r.bayes_ci[0]} - ${r.bayes_ci[1]}</td>`;
        tr.onclick = () => showDetails(r);
        tbody.appendChild(tr);
    });

    function showDetails(analysis) {
        detailPane.style.display = 'block';
        detailId.textContent = analysis.id;
        detailEcon.textContent = analysis.cost_fragility;
        
        if(detailChart) detailChart.destroy();
        detailChart = new Chart(detailChartCtx, {
            type: 'bar',
            data: { 
                labels: analysis.studies.map((_,i) => `Study ${i+1}`),
                datasets: [{ label: 'Effect Size', data: analysis.studies, backgroundColor: '#3b82f6' }]
            },
            options: { indexAxis: 'y', responsive: true }
        });
    }

    new Chart(document.getElementById('specialtyChart'), {
        type: 'radar',
        data: {
            labels: ['Cardio', 'Neuro', 'Infectious', 'Resp', 'General'],
            datasets: [{ label: 'Mean Fragility', data: [0.18, 0.45, 0.32, 0.55, 0.25], borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.2)' }]
        }
    });
</script>
</body>
</html>
